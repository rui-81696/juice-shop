name: CI

# Fast, blocking gate that lints what WE actually author in this project:
# GitHub Actions workflows and YAML config. (The upstream Juice Shop TypeScript
# is already linted upstream and we don't modify it, so linting it here added no
# value — this replaces that with checks that catch issues in our own changes.)

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint:
    name: Lint (workflows + YAML)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: actionlint (valida os workflows do GitHub Actions)
        # Baixa o binário oficial e corre-o sobre .github/workflows/. Apanha
        # sintaxe inválida, expressões erradas e problemas de segurança em Actions.
        # No runner do GitHub, também corre shellcheck nos blocos `run:`.
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: yamllint (consistência do YAML que escrevemos)
        run: |
          pip install --quiet yamllint
          yamllint \
            -d "{extends: relaxed, rules: {line-length: disable, document-start: disable}}" \
            .github/workflows/ .pre-commit-config.yaml
