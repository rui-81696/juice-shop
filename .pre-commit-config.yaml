# Pre-commit hooks — corre ANTES do commit existir, na tua máquina.
# Setup (uma vez por clone):
#   pip install pre-commit
#   pre-commit install
# Bypass de emergência:  SKIP=gitleaks git commit -m "..."
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
