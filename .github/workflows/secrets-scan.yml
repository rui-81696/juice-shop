name: "Security Gate · Secrets Scanning (Gitleaks)"

# Stage 1 of the DevSecOps pipeline: detect hard-coded secrets (API keys,
# tokens, private keys, passwords).
#
# Two complementary jobs, the way real teams run it:
#   * pr-diff-scan      -> on pull requests, scans ONLY the commits the PR adds.
#                          Fast, and fails only on secrets THIS PR introduces
#                          (never on old, already-triaged findings).
#   * full-history-scan -> on push to the default branch + a weekly schedule,
#                          scans the ENTIRE history as a safety net.

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:          # allow manual runs from the Actions tab
  schedule:
    - cron: "0 6 * * 1"       # weekly full re-scan, Mondays 06:00 UTC

# Least-privilege token: read the code, write only security findings.
permissions:
  contents: read
  security-events: write      # needed to upload SARIF to the Security tab

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  # ── Fast gate for pull requests: scan only the new commits ──────────────────
  pr-diff-scan:
    if: github.event_name == 'pull_request'
    name: Gitleaks (PR diff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # need history so the base..head range resolves

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan only the commits this PR introduces
        run: |
          gitleaks git . \
            --config .gitleaks.toml \
            --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact \
            --verbose \
            --exit-code 1
        # --log-opts restricts the scan to base..head, i.e. the PR's own commits.

  # ── Safety net: full history on push to default branch + weekly schedule ────
  full-history-scan:
    if: github.event_name != 'pull_request'
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan the entire git history
        run: |
          gitleaks git . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --redact \
            --verbose \
            --exit-code 1

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      - name: Upload report as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────────────────────
# Alternative: the official action `gitleaks/gitleaks-action@v2` does the same
# in fewer lines, but is only free for personal accounts / public repos and
# needs a GITLEAKS_LICENSE secret for organizations. We install the binary
# directly here so the pipeline is transparent and license-free.
# ─────────────────────────────────────────────────────────────────────────────
