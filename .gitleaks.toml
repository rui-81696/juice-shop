# Gitleaks configuration — DevSecOps lab (OWASP Juice Shop)
# Docs: https://github.com/gitleaks/gitleaks#configuration
#
# Strategy:
#   1. Inherit Gitleaks' full built-in ruleset (100+ detectors).
#   2. Triage findings over time by adding *justified* allowlist entries below.
#
# NOTE: Juice Shop intentionally ships test secrets and crypto keys. The first
# scan is SUPPOSED to fail. Your job is to review each finding and decide:
#   - real secret        -> remove it, rotate it, and (if in history) purge it.
#   - intentional/test   -> allowlist it here WITH a comment explaining why.
# Never allowlist something you haven't personally verified is safe.

title = "Gitleaks config — Juice Shop DevSecOps lab"

[extend]
# Start from Gitleaks' default rules instead of writing detectors from scratch.
useDefault = true

# ── Hybrid allowlist strategy ────────────────────────────────────────────────
# We split responsibility on purpose:
#
#   * .gitleaksignore  -> pins the exact HISTORICAL findings we reviewed (194).
#                         Precise, but tied to commit:file:line.
#   * this allowlist    -> ignores whole PATHS that can't reasonably hold a real
#                         secret (binaries, lockfiles, minified bundles). These
#                         are noise-by-nature, so ignoring them does NOT weaken
#                         detection in source code.
#
# IMPORTANT: we deliberately do NOT allowlist test/, cypress/ or data/ here.
# Real secrets do leak through test files, so those dirs stay strict and are
# only covered for the known historical findings via .gitleaksignore.
#
# When you confirm a NEW finding is a safe/intentional test secret, prefer:
#   - a `# gitleaks:allow` comment on that exact line, or
#   - adding its fingerprint to .gitleaksignore.

[[allowlists]]
description = "Binary, lockfile and minified paths: not a source of real secrets"
paths = [
  '''(.*?)(jpg|jpeg|png|gif|svg|ico|webp|bmp|woff|woff2|ttf|eot|mp3|mp4|pdf)$''',
  '''(.*/)?package-lock\.json$''',
  '''(.*/)?yarn\.lock$''',
  '''.*\.min\.(js|css)$''',
]
