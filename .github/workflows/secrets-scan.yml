name: "Security Gate · Secrets Scanning (Gitleaks)"

# Stage 1 of the DevSecOps pipeline: detect hard-coded secrets (API keys,
# tokens, private keys, passwords) before they reach a release.
#
# This gate scans the FULL git history, not just the current files, because a
# secret committed once stays in history forever even if later deleted.

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:          # allow manual runs from the Actions tab
  schedule:
    - cron: "0 6 * * 1"       # weekly full re-scan, Mondays 06:00 UTC

# Least-privilege token: read the code, write only security findings.
permissions:
  contents: read
  security-events: write      # needed to upload SARIF to the Security tab

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # 0 = entire history, required to scan past commits

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks (scan git history)
        run: |
          gitleaks git . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --redact \
            --verbose \
            --exit-code 1
        # --exit-code 1  => the job FAILS when secrets are found. This is the
        #                   "gate": a leak blocks the pipeline until triaged.
        # --redact       => secrets are masked in logs/reports (never printed).

      # Publish results even when the scan fails, so findings are always visible.
      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      - name: Upload report as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────────────────────
# Alternative: the official action `gitleaks/gitleaks-action@v2` does the same
# in fewer lines, but is only free for personal accounts / public repos and
# needs a GITLEAKS_LICENSE secret for organizations. We install the binary
# directly here so the pipeline is transparent and license-free.
# ─────────────────────────────────────────────────────────────────────────────
